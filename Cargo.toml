[package]
name = "arcf"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]
name = "arcf"

[dependencies]
burn = { version = "0.20", features = ["ndarray"] }
pyo3 = { version = "0.28", features = [
  "extension-module",
  "generate-import-lib"
] }
rand = "0.8"
rand_chacha = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
approx = "0.5"
