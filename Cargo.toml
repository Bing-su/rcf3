[package]
name = "rcf3"
version = "0.1.0"
edition = "2024"
description = "A Rust implementation of the Random Cut Forest algorithm for anomaly detection."
readme = "README.md"
repository = "https://github.com/Bing-su/rcf3"
license = "Apache-2.0"
keywords = [
  "anomaly",
  "anomaly detection",
  "machine learning",
  "random cut forest"
]

[lib]
crate-type = ["cdylib", "rlib"]
name = "rcf3"

[[bench]]
harness = false
name = "forest_bench"

[dependencies]
itertools = "0.14"
ndarray = "0.17"
ordered-float = "5.3"
pyo3 = { version = "0.28", features = [
  "extension-module",
  "generate-import-lib"
], optional = true }
rand = { version = "0.10", features = ["chacha"] }
rayon = "1.12"
serde = { version = "1", features = ["derive"], optional = true }
serde_json = { version = "1", optional = true }
thiserror = "2.0"

[dev-dependencies]
approx = "0.5"
rstest = "0.26"
tempfile = "3"

[target.'cfg(not(windows))'.dev-dependencies]
criterion = { version = "=0.5.1", features = ["html_reports"] }
pprof = { version = "0.15", features = ["criterion", "flamegraph"] }

[features]
default = ["serde"]
python = ["dep:pyo3", "serde"]
serde = [
  "dep:serde",
  "dep:serde_json",
  "ndarray/serde",
  "ordered-float/serde",
  "rand/serde"
]

[profile.release]
strip = true
lto = true
codegen-units = 1
