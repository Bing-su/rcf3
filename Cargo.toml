[package]
name = "arcf"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]
name = "arcf"

[dependencies]
itertools = "0.14"
pyo3 = { version = "0.28", features = [
  "extension-module",
  "generate-import-lib"
] }
rand = { version = "0.10", features = ["chacha", "serde"] }
rayon = "1.12"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2.0"

[dev-dependencies]
approx = "0.5"
rstest = "0.26"
