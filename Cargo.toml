[package]
name = "arcf"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]
name = "arcf"

[[bench]]
harness = false
name = "forest_bench"

[dependencies]
itertools = "0.14"
ndarray = { version = "0.17", features = ["serde"] }
ordered-float = { version = "5.3", features = ["serde"] }
pyo3 = { version = "0.28", features = [
  "extension-module",
  "generate-import-lib"
] }
rand = { version = "0.10", features = ["chacha", "serde"] }
rayon = "1.12"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2.0"

[dev-dependencies]
approx = "0.5"
criterion = { version = "=0.5.1", features = ["html_reports"] }
pprof = { version = "0.15", features = ["criterion", "flamegraph"] }
rstest = "0.26"

[profile.release]
strip = true
lto = true
codegen-units = 1
